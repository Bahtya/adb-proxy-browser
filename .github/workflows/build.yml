name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      delivery_profile:
        description: Select which platform set to package
        type: choice
        default: full
        options:
          - full
          - fast
          - windows-only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.inputs.delivery_profile || 'tag' }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(
          github.event_name == 'workflow_dispatch' && github.event.inputs.delivery_profile == 'windows-only' &&
          '[{"os":"windows-latest","platform":"windows","build_command":"npx electron-builder --config electron-builder.yml --win --publish never","artifact_name":"windows-build","artifact_path":"dist/*.exe\\ndist/*.zip"}]' ||
          github.event_name == 'workflow_dispatch' && github.event.inputs.delivery_profile == 'fast' &&
          '[{"os":"windows-latest","platform":"windows","build_command":"npx electron-builder --config electron-builder.yml --win --publish never","artifact_name":"windows-build","artifact_path":"dist/*.exe\\ndist/*.zip"},{"os":"ubuntu-latest","platform":"linux","build_command":"npx electron-builder --config electron-builder.yml --linux --publish never","artifact_name":"linux-build","artifact_path":"dist/*.AppImage\\ndist/*.deb\\ndist/*.zip"}]' ||
          '[{"os":"windows-latest","platform":"windows","build_command":"npx electron-builder --config electron-builder.yml --win --publish never","artifact_name":"windows-build","artifact_path":"dist/*.exe\\ndist/*.zip"},{"os":"macos-latest","platform":"macos","build_command":"npx electron-builder --config electron-builder.yml --mac --publish never","artifact_name":"macos-build","artifact_path":"dist/*.dmg\\ndist/*.zip"},{"os":"ubuntu-latest","platform":"linux","build_command":"npx electron-builder --config electron-builder.yml --linux --publish never","artifact_name":"linux-build","artifact_path":"dist/*.AppImage\\ndist/*.deb\\ndist/*.zip"}]'
        ) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Compute dependency cache key
        id: dep-cache-key
        shell: bash
        run: |
          hash=$(
            node <<'NODE'
            const crypto = require('crypto');
            const fs = require('fs');

            const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
            const normalizedPackages = Object.fromEntries(
              Object.entries(lock.packages || {}).map(([name, pkg]) => [
                name,
                {
                  version: pkg.version,
                  resolved: pkg.resolved,
                  integrity: pkg.integrity,
                  dependencies: pkg.dependencies,
                  optionalDependencies: pkg.optionalDependencies,
                  cpu: pkg.cpu,
                  os: pkg.os,
                  engines: pkg.engines,
                  hasInstallScript: pkg.hasInstallScript,
                },
              ]),
            );

            const normalizedLock = {
              lockfileVersion: lock.lockfileVersion,
              requires: lock.requires,
              packages: normalizedPackages,
              dependencies: lock.dependencies,
            };

            process.stdout.write(
              crypto.createHash('sha256').update(JSON.stringify(normalizedLock)).digest('hex'),
            );
            NODE
          )
          echo "value=$hash" >> "$GITHUB_OUTPUT"

      - name: Get npm cache directory
        shell: bash
        id: npm-cache-dir
        run: echo "dir=$(npm config get cache)" >> "$GITHUB_OUTPUT"

      - name: Cache npm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-npm-${{ env.NODE_VERSION }}-${{ steps.dep-cache-key.outputs.value }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ env.NODE_VERSION }}-

      - name: Cache Electron binaries (Windows)
        if: matrix.platform == 'windows'
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ steps.dep-cache-key.outputs.value }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Cache Electron binaries (Unix)
        if: matrix.platform != 'windows'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ steps.dep-cache-key.outputs.value }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Cache node-gyp (Windows)
        if: matrix.platform == 'windows'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\node-gyp
          key: ${{ runner.os }}-node-gyp-${{ env.NODE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-node-gyp-

      - name: Install dependencies
        shell: bash
        run: npm ci --prefer-offline --no-audit --ignore-scripts
        env:
          npm_config_fund: false
          npm_config_loglevel: warn
          npm_config_progress: false

      - name: Prepare bundled platform-tools
        run: npm run prepare:platform-tools

      - name: Build Electron app
        run: ${{ matrix.build_command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 14
          compression-level: 0
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
