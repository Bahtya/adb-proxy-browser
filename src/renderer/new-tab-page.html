<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      color: #202124;
      height: 100vh;
      overflow: auto;
    }
    .page { max-width: 800px; margin: 0 auto; padding: 48px 24px 32px; }
    h2 {
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .btn-edit {
      font-size: 12px;
      color: #1a73e8;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }
    .btn-edit:hover { background: #e8f0fe; }
    .bookmarks {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 8px;
      margin-bottom: 40px;
    }
    .bookmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: #5f6368;
      font-size: 12px;
      line-height: 28px;
    }
    .bookmark:hover { color: #ea4335; }
    .bookmark-favicon {
      width: 24px;
      height: 24px;
      background-size: 16px;
      background: #e8eaed;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .history-section h2 {
      margin-top: 6px;
      font-weight: 500;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
    }
    .favicon-err {
      background: #e8eaed;
      border-radius: 6px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #5f6368;
    }
  </style>
</head>
<body>
  <div class="page">
    <section>
      <h2>
        <span>Bookmarks</span>
        <button class="btn-edit" id="btn-edit-mode">Edit</button>
      </h2>
      <div class="bookmarks" id="bookmark-grid"></div>
    </section>
    <section class="history-section">
      <h2><span>Recent</span></h2>
      <div class="history-list" id="history-list"></div>
    </section>
  </div>
</body>
</html>
