<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      color: #202124;
      height: 100vh;
      overflow: auto;
    }
    .page { max-width: 800px; margin: 0 auto; padding: 48px 24px 32px; }
    h2 {
      font-size: 13px;
      font-weight: 500;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .btn-edit {
      font-size: 12px;
      color: #1a73e8;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }
    .btn-edit:hover { background: #e8f0fe; }
    .bookmarks {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 8px;
      margin-bottom: 40px;
    }
    .bookmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 8px;
      background: #fff;
      border-radius: 10px;
      text-decoration: none;
      color: #202124;
      font-size: 12px;
      text-align: center;
      cursor: pointer;
      border: 1px solid #e8eaed;
      transition: box-shadow 0.15s, background 0.15s;
      position: relative;
    }
    .bookmark:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); background: #fff; }
    .bookmark img { width: 28px; height: 28px; border-radius: 6px; object-fit: contain; }
    .bookmark .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
    .bookmark .del {
      display: none;
      position: absolute;
      top: 4px;
      right: 4px;
      background: #ea4335;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 12px;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
    }
    .edit-mode .bookmark .del { display: block; }
    .edit-mode .bookmark { border-style: dashed; }
    .bookmark-add {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 14px 8px;
      background: transparent;
      border-radius: 10px;
      border: 2px dashed #dadce0;
      color: #5f6368;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .bookmark-add:hover { border-color: #1a73e8; color: #1a73e8; background: #e8f0fe; }
    .bookmark-add .plus { font-size: 24px; line-height: 28px; }
    .history-section h2 { margin-bottom: 12px; }
    .history-list { display: flex; flex-direction: column; gap: 2px; }
    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      color: #202124;
    }
    .history-item:hover { background: #f1f3f4; }
    .history-item img { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }
    .history-item .h-title { font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-item .h-url { font-size: 11px; color: #5f6368; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 16px; }
    .modal input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
    }
    .modal input:focus { border-color: #1a73e8; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .btn-cancel {
      padding: 8px 16px;
      border: none;
      background: none;
      color: #5f6368;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-cancel:hover { background: #f1f3f4; }
    .btn-save {
      padding: 8px 16px;
      border: none;
      background: #1a73e8;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-save:hover { background: #1557g0; }
    .favicon-err {
      background: #e8eaed;
      border-radius: 6px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #5f6368;
    }
  </style>
</head>
<body>
  <div class="page">
    <section>
      <h2>
        <span>Bookmarks</span>
        <button class="btn-edit" id="btn-edit-mode">Edit</button>
      </h2>
      <div class="bookmarks" id="bookmark-grid"></div>
    </section>
    <section class="history-section">
      <h2><span>Recent</span></h2>
      <div class="history-list" id="history-list"></div>
    </section>
  </div>

  <!-- Add Bookmark Modal -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal">
      <h3>Add Bookmark</h3>
      <input type="text" id="bm-title" placeholder="Title">
      <input type="url" id="bm-url" placeholder="https://...">
      <div class="modal-btns">
        <button class="btn-cancel" id="bm-cancel">Cancel</button>
        <button class="btn-save" id="bm-save">Add</button>
      </div>
    </div>
  </div>

  <script>
    // Data will be injected by parent window
    window.bookmarks = [];
    window.history = [];
    let editMode = false;

    // Persist bookmarks: send to host app via console.log protocol
    function persistBookmarks() {
      console.log('__SAVE_BOOKMARKS__:' + JSON.stringify(window.bookmarks));
    }

    // Navigate: send URL to host app via console.log protocol
    function navigate(url) {
      console.log('__NAVIGATE__:' + url);
    }

    function iconEl(url) {
      const domain = (() => { try { return new URL(url).origin; } catch { return ''; } })();
      const img = document.createElement('img');
      img.src = domain + '/favicon.ico';
      img.onerror = () => {
        const d = document.createElement('div');
        d.className = 'favicon-err';
        try { d.textContent = (new URL(url).hostname[0] || '?').toUpperCase(); } catch { d.textContent = '?'; }
        img.replaceWith(d);
      };
      return img;
    }

    function renderBookmarks() {
      const grid = document.getElementById('bookmark-grid');
      grid.className = 'bookmarks' + (editMode ? ' edit-mode' : '');
      grid.innerHTML = '';
      window.bookmarks.forEach((bm, i) => {
        const a = document.createElement('div');
        a.className = 'bookmark';
        a.appendChild(iconEl(bm.url));
        const name = document.createElement('span');
        name.className = 'name';
        name.title = bm.title;
        name.textContent = bm.title;
        a.appendChild(name);
        const del = document.createElement('button');
        del.className = 'del';
        del.textContent = '×';
        del.onclick = (e) => {
          e.stopPropagation();
          window.bookmarks.splice(i, 1);
          persistBookmarks();
          renderBookmarks();
        };
        a.appendChild(del);
        if (!editMode) {
          a.onclick = () => navigate(bm.url);
        }
        grid.appendChild(a);
      });
      // Add button
      const add = document.createElement('div');
      add.className = 'bookmark-add';
      add.innerHTML = '<span class="plus">+</span><span>Add</span>';
      add.onclick = () => openAddModal();
      grid.appendChild(add);
    }

    function openAddModal(prefillUrl) {
      document.getElementById('bm-title').value = '';
      document.getElementById('bm-url').value = prefillUrl || '';
      document.getElementById('add-modal').classList.add('active');
      document.getElementById('bm-title').focus();
    }

    document.getElementById('bm-cancel').onclick = () => document.getElementById('add-modal').classList.remove('active');
    document.getElementById('bm-save').onclick = () => {
      const title = document.getElementById('bm-title').value.trim();
      const url = document.getElementById('bm-url').value.trim();
      if (!url) return;
      window.bookmarks.push({ title: title || url, url });
      persistBookmarks();
      document.getElementById('add-modal').classList.remove('active');
      renderBookmarks();
    };
    document.getElementById('add-modal').onclick = (e) => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('active'); };

    document.getElementById('btn-edit-mode').onclick = () => {
      editMode = !editMode;
      document.getElementById('btn-edit-mode').textContent = editMode ? 'Done' : 'Edit';
      renderBookmarks();
    };

    function renderHistory() {
      const list = document.getElementById('history-list');
      list.innerHTML = '';
      const items = window.history || [];
      if (!items.length) return;
      items.forEach(item => {
        const a = document.createElement('div');
        a.className = 'history-item';
        const domain = (() => { try { return new URL(item.url).origin; } catch { return ''; } })();
        const img = document.createElement('img');
        img.src = domain + '/favicon.ico';
        img.onerror = () => img.remove();
        a.appendChild(img);
        const info = document.createElement('div');
        info.style.flex = '1';
        info.style.overflow = 'hidden';
        const t = document.createElement('div');
        t.className = 'h-title';
        t.textContent = item.title || item.url;
        const u = document.createElement('div');
        u.className = 'h-url';
        u.textContent = item.url;
        info.appendChild(t);
        info.appendChild(u);
        a.appendChild(info);
        a.onclick = () => navigate(item.url);
        list.appendChild(a);
      });
    }

    // Initial render (data may be empty until injected)
    renderBookmarks();
    renderHistory();
  </script>
</body>
</html>
