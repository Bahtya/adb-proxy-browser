<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="blueBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5BB0FF"/>
      <stop offset="100%" style="stop-color:#1A72E8"/>
    </linearGradient>
    <radialGradient id="globeSheen" cx="36%" cy="30%" r="58%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.30"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="greenDot" cx="38%" cy="34%" r="62%">
      <stop offset="0%" style="stop-color:#6EFFA8"/>
      <stop offset="100%" style="stop-color:#1DB954"/>
    </radialGradient>
    <filter id="outerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1055B0" flood-opacity="0.30"/>
    </filter>
    <clipPath id="globeClip">
      <circle cx="256" cy="256" r="216"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect width="512" height="512" rx="108" fill="#EEF4FF" filter="url(#outerShadow)"/>

  <!-- Globe fill -->
  <circle cx="256" cy="256" r="216" fill="url(#blueBg)"/>

  <!-- Globe grid lines clipped inside sphere -->
  <g clip-path="url(#globeClip)" fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="8">
    <!-- Equator -->
    <line x1="40" y1="256" x2="472" y2="256"/>
    <!-- Horizontal latitude bands -->
    <ellipse cx="256" cy="256" rx="216" ry="76"/>
    <ellipse cx="256" cy="256" rx="216" ry="152"/>
    <!-- Prime meridian -->
    <line x1="256" y1="40" x2="256" y2="472"/>
    <!-- One off-center vertical meridian -->
    <ellipse cx="256" cy="256" rx="108" ry="216"/>
  </g>

  <!-- Sheen overlay -->
  <circle cx="256" cy="256" r="216" fill="url(#globeSheen)"/>

  <!-- Globe border ring -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#FFFFFF" stroke-opacity="0.20" stroke-width="5"/>

  <!-- ADB proxy tunnel arc: a bold curved bridge line clipped to globe -->
  <g clip-path="url(#globeClip)">
    <path
      d="M 108 330 Q 256 420 404 330"
      fill="none"
      stroke="#FFFFFF"
      stroke-opacity="0.60"
      stroke-width="16"
      stroke-linecap="round"
    />
  </g>

  <!-- Left endpoint node (browser side) -->
  <circle cx="108" cy="330" r="14" fill="#FFFFFF" opacity="0.80"/>

  <!-- Right endpoint node (Android/phone side) - green accent -->
  <!-- Soft glow halo -->
  <circle cx="404" cy="330" r="34" fill="#22C55E" opacity="0.18"/>
  <!-- Main green circle -->
  <circle cx="404" cy="330" r="22" fill="url(#greenDot)"/>
  <!-- Inner white pip -->
  <circle cx="404" cy="330" r="8" fill="#FFFFFF" opacity="0.88"/>
</svg>
