<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="trayBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5BB0FF"/>
      <stop offset="100%" style="stop-color:#1A72E8"/>
    </linearGradient>
    <clipPath id="trayClip">
      <circle cx="8" cy="8" r="7"/>
    </clipPath>
  </defs>

  <!-- Globe -->
  <circle cx="8" cy="8" r="7" fill="url(#trayBlue)"/>

  <!-- Minimal grid: equator + meridian, clipped -->
  <g clip-path="url(#trayClip)" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1">
    <line x1="1" y1="8" x2="15" y2="8"/>
    <ellipse cx="8" cy="8" rx="3.5" ry="7"/>
  </g>

  <!-- Proxy arc at bottom -->
  <g clip-path="url(#trayClip)">
    <path d="M 3 11 Q 8 14 13 11" fill="none" stroke="#FFFFFF" stroke-opacity="0.70" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Green connection dot (Android side) -->
  <circle cx="13" cy="11" r="2.5" fill="#22C55E"/>
  <circle cx="13" cy="11" r="1" fill="#FFFFFF" opacity="0.85"/>
</svg>
