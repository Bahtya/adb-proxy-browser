appId: com.bahtya.adb-proxy-browser
productName: ADB Proxy Browser
icon: assets/icon.png
directories:
  output: dist
files:
  - src/**/*
  - assets/**/*
  - package.json
extraResources:
  - from: bundled-tools/platform-tools
    to: platform-tools
    filter:
      - '**/*'
win:
  icon: assets/icon.png
  target:
    - target: zip
      arch:
        - x64
    - target: portable
      arch:
        - x64
mac:
  icon: assets/icon.png
  target:
    - target: zip
      arch:
        - x64
        - arm64
linux:
  icon: assets/icon.png
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
